server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for content-hashed assets (Astro emits hashed JS/CSS
    # under /_astro/). Everything else stays short-cache.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA-style fallback isn't needed -- Astro emits one HTML per
    # route -- but try_files with =404 gives clean 404s for missing
    # paths without falling back to index.html.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security headers. CF Tunnel terminates TLS so we leave HSTS to
    # the edge.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}
