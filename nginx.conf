server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers must be repeated inside every `location` block:
    # nginx's `add_header` does NOT inherit from outer scopes once a
    # location adds its own header. The bench's nuclei scan flagged
    # X-Content-Type-Options missing on hashed-asset paths because the
    # /_astro/ locations below override Cache-Control without re-adding
    # the security set. Factor into a snippet and `include` it.
    #
    # CF Tunnel terminates TLS, so HSTS belongs at the CF edge
    # (Dashboard -> SSL/TLS -> Edge Certificates -> HSTS). Don't add
    # `Strict-Transport-Security` here -- it would only ever take effect
    # if a client somehow hit the origin directly, which the tunnel
    # prevents by construction.

    # Long cache for content-hashed assets (Astro emits hashed JS/CSS
    # under /_astro/). Everything else stays short-cache.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "interest-cohort=()" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Docs moved to their own subdomain (docs.catena.run). 301 every
    # legacy /docs/* hit to the new host so existing inbound links +
    # search-engine ranking signal consolidate. Query string is
    # auto-appended by nginx because the redirect URL has no `?`.
    location ~ ^/docs(/.*)?$ {
        return 301 https://docs.catena.run$1;
    }

    # SPA-style fallback isn't needed -- Astro emits one HTML per
    # route -- but try_files with =404 gives clean 404s for missing
    # paths without falling back to index.html.
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "interest-cohort=()" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}
