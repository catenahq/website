name: Semgrep (report-only)

# Wave 3 SAST gate. Astro 6 marketing site -- mostly content
# but the Astro config + scripts/ + nginx.conf are surface
# worth scanning. Report-only via continue-on-error.
# See ~/.claude/plans/make-a-plan-that-shimmying-dragon.md.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '37 6 * * 1'

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install semgrep
        run: pip install --no-cache-dir semgrep

      - name: Scan (report-only)
        continue-on-error: true
        run: |
          semgrep scan \
            --config=p/javascript \
            --config=p/typescript \
            --sarif \
            --output=semgrep.sarif \
            --metrics=off \
            --error \
            --verbose \
            .

      - name: Summarize
        if: always()
        run: |
          if [[ -f semgrep.sarif ]]; then
            COUNT=$(jq '[.runs[]?.results[]?] | length' semgrep.sarif 2>/dev/null || echo 0)
            echo "## Semgrep findings: $COUNT" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$COUNT" != "0" ]]; then
              jq -r '.runs[]?.results[]? | "- [\(.level // "warning")] \(.ruleId) at \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)"' \
                semgrep.sarif >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
              echo "::warning::Semgrep found $COUNT issue(s) -- see semgrep.sarif artifact"
            fi
          fi

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore
