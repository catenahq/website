name: Semgrep

# Wave 4 (blocking) SAST gate. Astro 6 marketing site -- mostly
# content but the Astro config + scripts/ + nginx.conf are surface
# worth scanning.
#
# Promoted from report-only on 2026-05-24 (Wave 4). `--error` is
# the rule-severity floor: only ERROR rules block; WARNING / INFO
# stay advisory.
# See ~/.claude/plans/make-a-plan-that-shimmying-dragon.md.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '37 6 * * 1'

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: '3.14'

      - name: Scan
        run: |
          uvx semgrep scan \
            --config=p/javascript \
            --config=p/typescript \
            --sarif \
            --output=semgrep.sarif \
            --metrics=off \
            --error \
            --verbose \
            .

      - name: Summarize
        if: always()
        run: |
          if [[ -f semgrep.sarif ]]; then
            COUNT=$(jq '[.runs[]?.results[]?] | length' semgrep.sarif 2>/dev/null || echo 0)
            echo "## Semgrep findings: $COUNT" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$COUNT" != "0" ]]; then
              jq -r '.runs[]?.results[]? | "- [\(.level // "warning")] \(.ruleId) at \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)"' \
                semgrep.sarif >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
              echo "::warning::Semgrep found $COUNT issue(s) -- see semgrep.sarif artifact"
            fi
          fi

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore
