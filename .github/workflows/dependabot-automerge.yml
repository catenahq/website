name: Dependabot auto-merge (security advisories only)

# Auto-merges Dependabot PRs whose source is a published security
# advisory (Dependabot tags them with the `security` label) AND
# that bump only minor or patch versions. Major bumps and routine
# version-update PRs always require manual review.
#
# Wave 4 made Semgrep / OSV-Scanner / Trivy blocking, so a
# Dependabot bump that introduces a new HIGH/CRITICAL CVE will fail
# the gate and never auto-merge.
#
# Prerequisite (one-time, in repo Settings):
#   - Settings > General > Pull Requests > Allow auto-merge: ON
#   - Settings > Branches > Branch protection on `main`: require
#     status checks to pass before merging (list the Wave 4 gates).

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Read Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Enable auto-merge (security advisory, non-major)
        if: contains(github.event.pull_request.labels.*.name, 'security') && steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
