name: zizmor (Actions audit, report-only)

# Static security audit of this repo's GitHub Actions workflows
# (template injection, credential persistence, excessive permissions,
# dangerous triggers) -- an axis the other gates do not cover. Runs via
# uvx (uv self-provisions Python). Report-only: the baseline has
# artipacked + excessive-permissions findings; triage, then promote to
# blocking by dropping continue-on-error and failing on the exit code.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: '3.14'
      - name: Audit workflows (report-only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uvx zizmor@latest --format sarif .github/workflows/ > zizmor.sarif || true
      - name: Summarize
        if: always()
        run: |
          if [ -f zizmor.sarif ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('zizmor.sarif')); print(sum(len(r.get('results',[])) for r in d.get('runs',[])))" 2>/dev/null || echo 0)
            echo "## zizmor findings: $COUNT" >> "$GITHUB_STEP_SUMMARY"
            if [ "$COUNT" != "0" ]; then
              echo "::warning::zizmor found $COUNT workflow issue(s) -- see the zizmor-sarif artifact (report-only)."
            fi
          fi
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zizmor-sarif
          path: zizmor.sarif
          if-no-files-found: ignore
