name: OSV-Scanner

# Wave 4 (blocking) dependency-CVE gate. Uses Google's reusable
# workflow. upload-sarif=false (private repo, no GitHub Advanced
# Security). fail-on-vuln=true blocks on any vulnerability.
#
# Promoted from report-only on 2026-05-24 (Wave 4). Tune via
# osv-scanner.toml ignore entries once the first PR surfaces
# baseline findings. See plan in ~/.claude/plans/.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-scheduled:
    if: github.event_name != 'pull_request'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    with:
      upload-sarif: false
      fail-on-vuln: true

  scan-pr:
    if: github.event_name == 'pull_request'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    with:
      upload-sarif: false
      fail-on-vuln: true
