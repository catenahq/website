name: OSV-Scanner

# Wave 4 (blocking) dependency-CVE gate.
# Migrated 2026-05-25 from google/osv-scanner-action reusable workflow
# to direct Docker invocation so the job runs on the self-hosted laptop
# runner (the reusable workflow pins runs-on upstream and cannot be
# overridden). Any vulnerability found by osv-scanner exits non-zero
# and fails the job, preserving fail-on-vuln=true semantics.
# The PR-diff-only mode is replaced by full-scan-on-every-trigger;
# baseline must stay clean either way under fail-on-vuln.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: OSV-Scanner (latest user-space binary, no docker)
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) arch=amd64 ;;
            aarch64|arm64) arch=arm64 ;;
            *) echo "::error::unsupported arch $(uname -m)"; exit 1 ;;
          esac
          bindir="$HOME/.local/bin"; mkdir -p "$bindir"
          # Always fetch the latest release: the scanner self-updates with no
          # pin to maintain. On the persistent self-hosted runner the binary
          # and osv-scanner's vuln DB live under $HOME and are reused between
          # runs; ephemeral hosted runners just re-download (a small binary).
          curl -fsSL -o "$bindir/osv-scanner" \
            "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_${arch}"
          chmod +x "$bindir/osv-scanner"
          "$bindir/osv-scanner" scan source --recursive .
