name: Trivy fs

# Wave 4 (blocking) IaC + secret + lockfile gate. Filesystem scan
# only: the website Docker image is built at deploy time via Dokploy
# using a vendor/ path that the CI's sibling-read pattern does not
# mirror, so image scanning is still deferred. The fs scan catches
# lockfile CVEs, Dockerfile base-image misconfig, and any committed
# secrets.
#
# Promoted from report-only on 2026-05-24 (Wave 4). Severity floor
# HIGH+CRITICAL, ignore-unfixed:true so unpatched CVEs do not block
# until a fix exists upstream.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '43 6 * * 1'

permissions:
  contents: read

jobs:
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: 'json'
          output: 'trivy-fs.json'
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-fs-report
          path: trivy-fs.json
          if-no-files-found: ignore
