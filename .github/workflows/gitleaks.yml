name: gitleaks (report-only)

# Wave 1 secrets-scan gate. Report-only: a finding emits a job
# warning + artifact, but never fails the workflow. Promote to
# blocking (drop continue-on-error) after the SECURITY_BASELINE
# is acknowledged. See ~/.claude/plans/make-a-plan-that-shimmying-dragon.md.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: [self-hosted, laptop]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree + full history (report-only)
        continue-on-error: true
        run: |
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --redact \
            --report-format json \
            --report-path gitleaks-report.json \
            --verbose

      - name: Summarize
        if: always()
        run: |
          if [[ -f gitleaks-report.json ]]; then
            COUNT=$(jq 'length' gitleaks-report.json 2>/dev/null || echo 0)
            echo "## gitleaks findings: $COUNT" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$COUNT" != "0" ]]; then
              jq -r '.[] | "- \(.RuleID) at \(.File):\(.StartLine) (commit \(.Commit))"' gitleaks-report.json >> "$GITHUB_STEP_SUMMARY" || true
              echo "::warning::gitleaks found $COUNT potential secret(s) -- see gitleaks-report.json artifact"
            fi
          else
            echo "gitleaks produced no report file" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
