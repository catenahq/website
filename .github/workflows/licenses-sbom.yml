name: Licenses + SBOM (report-only)

# Trivy license scan + CycloneDX SBOM over the dependency tree -- the
# license-compliance + bill-of-materials axis (matters for the
# redistributed CE binary and the template catalog). Report-only: no
# license policy is enforced yet; the severity floor surfaces
# copyleft / unknown licenses for review. SBOM is uploaded as an
# artifact. trivy-action is a composite action (trivy binary, no docker).

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '47 6 * * 1'

permissions:
  contents: read

jobs:
  licenses-sbom:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: License scan (report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'license'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          format: 'json'
          output: 'trivy-licenses.json'
      - name: SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.cdx.json'
      - name: Upload licenses + SBOM
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: licenses-sbom
          path: |
            trivy-licenses.json
            sbom.cdx.json
          if-no-files-found: ignore
