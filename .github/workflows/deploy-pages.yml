# catenahq/website -- deploy catena.run to GitHub Pages.
#
# Static Astro build (npm run build -> dist/) published to GitHub Pages.
# The custom domain catena.run is set via public/CNAME (persisted on
# deploy). Runs on push to main (the protected deploy branch); dev is
# the active-edit branch and does not deploy.
#
# @catenahq/contracts is consumed via sibling read (file:../contracts);
# the build checks out catenahq/contracts alongside using
# CONTRACTS_READ_TOKEN (same secret as ci.yml).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: no permissions by default; each job grants only what
# it needs (zizmor flags workflow-level pages/id-token write as broad).
permissions: {}

# Allow one concurrent deployment; never cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out website
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: website
          persist-credentials: false
      - name: Check out sibling contracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: catenahq/contracts
          token: ${{ secrets.CONTRACTS_READ_TOKEN }}
          path: contracts
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Install
        working-directory: ./website
        run: npm ci
      - name: Build
        working-directory: ./website
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website/dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
