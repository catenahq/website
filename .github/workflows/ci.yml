# catenahq/website -- CI.
#
# Marketing-only Astro build. The docs site lives in its own repo
# at github.com/catenahq/docs and ships as its own deployment.
#
# catenahq/contracts is consumed via sibling read: package.json
# declares `"@catenahq/contracts": "file:../contracts"`, so the
# checkout step puts contracts at $GITHUB_WORKSPACE/contracts and the
# website job at $GITHUB_WORKSPACE/website. Local dev mirrors this
# layout (both repos checked out side-by-side under catena/).
#
# Required secret:
#   CONTRACTS_READ_TOKEN  fine-grained GitHub PAT with `Contents: read`
#                         on catenahq/contracts only.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  website:
    name: website (i18n parity + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          path: website
      - name: Check out sibling contracts
        uses: actions/checkout@v4
        with:
          repository: catenahq/contracts
          token: ${{ secrets.CONTRACTS_READ_TOKEN }}
          path: contracts
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json
      - name: Install
        working-directory: ./website
        run: npm ci
      - name: Unicode hygiene (no em dashes / smart quotes / decorative symbols)
        working-directory: ./website
        run: npm run check:unicode
      - name: i18n parity
        working-directory: ./website
        run: npm run test:i18n
      - name: Typecheck
        working-directory: ./website
        run: npm run check
      - name: Build
        working-directory: ./website
        run: npm run build
