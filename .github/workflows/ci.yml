# catenahq/website -- CI.
#
# Marketing-only Astro build. The docs site lives in its own repo
# at github.com/catenahq/docs and ships as its own deployment.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  website:
    name: website (i18n parity + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: i18n parity
        run: npm run test:i18n
      - name: Typecheck
        run: npm run check
      - name: Build
        run: npm run build
