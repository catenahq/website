# catenahq/website -- CI.
#
# Marketing-only Astro build. The docs site lives in its own repo
# at github.com/catenahq/docs and ships as its own deployment.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts-freshness:
    name: contracts freshness gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vendored @catenahq/contracts matches the latest tag
        env:
          GH_TOKEN: ${{ secrets.CONTRACTS_READ_TOKEN }}
        run: |
          LATEST=$(gh api repos/catenahq/contracts/tags --paginate --jq '.[].name' | sort -V | tail -1)
          LATEST="${LATEST#v}"
          OUR_TAR=$(ls vendor/catenahq-contracts-*.tgz 2>/dev/null | head -1 || true)
          if [ -z "$OUR_TAR" ]; then
            echo "::error::no vendor/catenahq-contracts-*.tgz found."
            exit 1
          fi
          OUR_VER=$(basename "$OUR_TAR" | sed 's/catenahq-contracts-//;s/\.tgz$//')
          if [ "$OUR_VER" != "$LATEST" ]; then
            echo "::error::vendored contracts $OUR_VER is stale (latest: $LATEST). Run the 'Bump @catenahq/contracts to latest' workflow or wait for the daily auto-bump PR."
            exit 1
          fi
          echo "vendored contracts $OUR_VER is current."

  website:
    name: website (i18n parity + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: i18n parity
        run: npm run test:i18n
      - name: Typecheck
        run: npm run check
      - name: Build
        run: npm run build
