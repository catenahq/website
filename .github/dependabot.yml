version: 2

# Wave 1 dependency automation. website/ vendors @catenahq/contracts
# as a tarball; Dependabot won't touch the vendored tgz (handled by
# the contracts-freshness gate + bump workflow), but it covers Astro,
# nginx base image, and GitHub Actions versions.

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      docker:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
